[pytest]
addopts =
    -v
    --headed
    --browser chromium

    --alluredir=reports/allure-results
    --clean-alluredir

    --junitxml=reports/current/junit.xml

    --json-report
    --json-report-file=reports/current/report.json
    --json-report-indent=2

    --output=reports/artifacts
    --screenshot=only-on-failure
    --full-page-screenshot
    --video=retain-on-failure
    --tracing=retain-on-failure


testpaths = tests

log_cli = false
log_file = reports/current/test_execution.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

markers =
    smoke: Smoke test cases
    regression: Regression test cases
    appointment: Appointment test cases
    auth: Login/logout test cases